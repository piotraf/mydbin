name: Verify56 Live (5min)

on:
  workflow_dispatch:

env:
  TEST_IP: "192.168.40.20"
  CI_KEY: "/opt/actions-runner/.ssh/ci_citest"
  IMAGE: "mysql-runner:base"

jobs:
  live:
    runs-on: [self-hosted]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy mydbinstance.sh to citest01
        run: |
          scp -i "$CI_KEY" -o StrictHostKeyChecking=no scripts/mydbinstance.sh ci@$TEST_IP:/tmp/mydbinstance.sh

      - name: Start container + 5.6 instance, hold 5 min
        run: |
          CNAME="my56-${GITHUB_RUN_ID}"
          ssh -i "$CI_KEY" -o StrictHostKeyChecking=no ci@$TEST_IP \
            "podman run -d --name $CNAME -v /ci:/ci:ro -v /tmp/mydbinstance.sh:/usr/local/bin/mydbinstance.sh:ro $IMAGE sleep 600"
          ssh -i "$CI_KEY" -o StrictHostKeyChecking=no ci@$TEST_IP \
            "podman exec $CNAME bash -lc '
              set -euo pipefail
              MYDB=\"bash /usr/local/bin/mydbinstance.sh\"
              VER=mysql-5.6.51-linux-glibc2.12-x86_64
              mkdir -p /var/tmp/mysqlbin /var/tmp/mydb ~/.mydbinstancerc.d
              tar xf /ci/mysql/\$VER.tar.gz -C /var/tmp/mysqlbin
              printf \"MYROOTPATH=/var/tmp/mydb\nMYBINPATH=/var/tmp/mysqlbin\n\" > ~/.mydbinstancerc
              printf \"2\n\" | \$MYDB --create my56
              \$MYDB --initialize_56 my56
              \$MYDB --start my56
            '"
          echo "============================================================"
          echo "LIVE. Log in from alita (within 5 min):"
          echo "ssh -i ~/macalita/.ssh/ghr01_localadm localadm@192.168.40.10 -t 'sudo -u actions ssh -i /opt/actions-runner/.ssh/ci_citest -o StrictHostKeyChecking=no -t ci@192.168.40.20 \"podman exec -it $CNAME bash -l\"'"
          echo "============================================================"
          sleep 300
          ssh -i "$CI_KEY" -o StrictHostKeyChecking=no ci@$TEST_IP "podman rm -f $CNAME || true"
